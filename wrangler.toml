# Cloudflare Workers static hosting for Next.js `output: "export"`
# Build first: npm run build  →  publishes the `out/` folder

name = "typologyquiz"
compatibility_date = "2025-07-01"

# Serve the static export as the site
[assets]
directory = "./out"
# Multi-page static site (not a client-side SPA router)
not_found_handling = "404-page"
html_handling = "auto"
