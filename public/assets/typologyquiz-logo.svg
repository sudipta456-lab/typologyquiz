<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">TypologyQuiz</title>
  <desc id="desc">TypologyQuiz logo — four-color mark with wordmark and tagline</desc>

  <defs>
    <linearGradient id="quizGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A91ED"/>
      <stop offset="40%" stop-color="#3B82F0"/>
      <stop offset="70%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0C4D0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C0C4D0" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C0C4D0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C0C4D0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="centerClip">
      <circle cx="47" cy="47" r="11"/>
    </clipPath>
  </defs>

  <!-- ===== MARK ===== -->
  <g id="mark" transform="translate(6, 24)">
    <rect x="0"  y="0"  width="45" height="45" rx="10" ry="10" fill="#0795EA"/>
    <rect x="49" y="0"  width="45" height="45" rx="10" ry="10" fill="#F9684D"/>
    <rect x="0"  y="49" width="45" height="45" rx="10" ry="10" fill="#07AD9C"/>
    <rect x="49" y="49" width="45" height="45" rx="10" ry="10" fill="#F47A9E"/>

    <g clip-path="url(#centerClip)">
      <rect x="36" y="36" width="11" height="11" fill="#0795EA"/>
      <rect x="47" y="36" width="11" height="11" fill="#F9684D"/>
      <rect x="36" y="47" width="11" height="11" fill="#07AD9C"/>
      <rect x="47" y="47" width="11" height="11" fill="#F47A9E"/>
    </g>

    <circle cx="47" cy="47" r="13.5" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <g fill="#FFFFFF">
      <rect x="44.7" y="40.5" width="4.6" height="13" rx="1.3"/>
      <rect x="40.5" y="44.7" width="13" height="4.6" rx="1.3"/>
    </g>
  </g>

  <!--
    Wordmark: TypologyQuiz (no .com)
    Approx width ~288 → start 118, end 406, midpoint 262
    Tagline + hairlines share that midpoint
  -->
  <text
    x="118"
    y="88"
    font-family="Nunito, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="46"
    letter-spacing="-1.2"
  >
    <tspan fill="#2D404F">Typology</tspan><tspan fill="url(#quizGrad)">Quiz</tspan>
  </text>

  <!-- Tagline centered on wordmark midpoint (x=275) -->
  <line x1="175" y1="114" x2="225" y2="114" stroke="url(#fadeL)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="325" y1="114" x2="375" y2="114" stroke="url(#fadeR)" stroke-width="1.4" stroke-linecap="round"/>
  <text
    x="275"
    y="118"
    text-anchor="middle"
    font-family="Nunito, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="14.5"
    font-weight="600"
    fill="#8181B3"
    letter-spacing="0.85"
  >discover your type</text>
</svg>
